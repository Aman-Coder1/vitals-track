<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assessment | Vitals Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css"> <style>
        .assessment-card {
            max-width: 600px; margin: 100px auto; padding: 40px;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            border-radius: 24px; text-align: center; border: 1px solid #e2e8f0;
        }
        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.5s; }
        .option-btn {
            display: block; width: 100%; padding: 15px; margin: 10px 0;
            border: 1px solid #e2e8f0; border-radius: 12px; background: white;
            cursor: pointer; transition: 0.3s; font-weight: 600;
        }
        .option-btn:hover { border-color: var(--primary); background: #f0f9ff; color: var(--primary); }
        .loading-bar { width: 100%; height: 4px; background: #e2e8f0; border-radius: 2px; margin-top: 20px; overflow: hidden; }
        .progress { width: 0%; height: 100%; background: var(--primary); transition: 0.5s; }
    </style>
</head>
<body class="light-theme">
    <div class="background-env">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="assessment-card">
        <div class="loading-bar"><div class="progress" id="progress"></div></div>
        
        <div class="step active" id="step1">
            <h2>What is your primary focus?</h2>
            <p>This helps the AI tune your daily vitals check.</p>
            <button class="option-btn" onclick="nextStep(2)">Mental Clarity & Stress</button>
            <button class="option-btn" onclick="nextStep(2)">Physical Performance</button>
            <button class="option-btn" onclick="nextStep(2)">Better Sleep & Recovery</button>
        </div>

        <div class="step" id="step2">
            <h2>Current Activity Level?</h2>
            <button class="option-btn" onclick="nextStep(3)">Sedentary (Office/Study)</button>
            <button class="option-btn" onclick="nextStep(3)">Active (3-4 workouts/week)</button>
            <button class="option-btn" onclick="nextStep(3)">Athlete (Daily intensity)</button>
        </div>

        <div class="step" id="step3">
            <h2 id="ai-status">Calibrating AI Model...</h2>
            <p>Synthesizing your health profile.</p>
        </div>
    </div>

    <script>
        let currentStep = 1;
        function nextStep(step) {
            document.getElementById(`step${currentStep}`).classList.remove('active');
            currentStep = step;
            document.getElementById(`step${currentStep}`).classList.add('active');
            
            // Update Progress Bar
            const progress = (currentStep / 3) * 100;
            document.getElementById('progress').style.width = `${progress}%`;

            if(step === 3) {
                processAI();
            }
        }

        function processAI() {
            const status = document.getElementById('ai-status');
            setTimeout(() => status.innerText = "Analyzing Stress Patterns...", 1000);
            setTimeout(() => status.innerText = "Generating Daily Vitals...", 2000);
            setTimeout(() => {
                // Once finished, redirect to the actual dashboard
                window.location.href = "index.html"; 
            }, 3500);
        }
    </script>
</body>
</html>
