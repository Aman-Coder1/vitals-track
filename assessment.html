<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Health Scan | Vitals Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="signup.css"> <style>
        .assessment-card {
            max-width: 500px; margin: 50px auto; padding: 40px;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px);
            border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center; border: 1px solid rgba(255,255,255,0.5);
        }
        .vitals-form { display: flex; flex-direction: column; gap: 20px; text-align: left; }
        label { font-weight: 600; color: #1e293b; font-size: 0.9rem; }
        input[type="range"] { width: 100%; cursor: pointer; accent-color: #0ea5e9; }
        .val-display { float: right; color: #0ea5e9; font-weight: 800; }
        .ai-status-box { display: none; padding: 20px; background: #f0f9ff; border-radius: 15px; margin-top: 20px; }
        .pulse { animation: pulse-blue 2s infinite; }
        @keyframes pulse-blue { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="background-env">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="assessment-card animate__animated animate__fadeInUp">
        <div class="logo" style="color: #0ea5e9; margin-bottom: 20px; font-weight: 800;">AI<span>SCAN</span></div>
        <h2 style="margin-bottom: 10px;">Initialize Your Vitals</h2>
        <p style="color: #64748b; font-size: 0.9rem; margin-bottom: 30px;">Input your current state for the AI to calibrate.</p>

        <form class="vitals-form" id="vitalsForm">
            <div class="input-group">
                <label>Stress Level <span class="val-display" id="stressVal">5</span></label>
                <input type="range" id="stress" min="1" max="10" value="5" oninput="document.getElementById('stressVal').innerText = this.value">
            </div>

            <div class="input-group">
                <label>Energy Level <span class="val-display" id="energyVal">5</span></label>
                <input type="range" id="energy" min="1" max="10" value="5" oninput="document.getElementById('energyVal').innerText = this.value">
            </div>

            <div class="input-group">
                <label>Last Night's Sleep (Hours) <span class="val-display" id="sleepVal">7</span></label>
                <input type="range" id="sleep" min="1" max="12" value="7" oninput="document.getElementById('sleepVal').innerText = this.value">
            </div>

            <button type="submit" class="btn-submit">Analyze My Health →</button>
        </form>

        <div id="aiStatus" class="ai-status-box">
            <p class="pulse" id="statusText" style="font-weight: 600; color: #0ea5e9;">Connecting to Neural Core...</p>
        </div>
    </div>

    <script>
       document.getElementById('vitalsForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    // 1. Capture the data
    const stress = parseInt(document.getElementById('stress').value);
    const energy = parseInt(document.getElementById('energy').value);
    const sleep = parseInt(document.getElementById('sleep').value);

    // 2. Calculate a "Recovery Score" (Simple Logic)
    // Formula: (Energy + Sleep - Stress) adjusted to a 1-10 scale
    let recoveryScore = ((energy + sleep + (10 - stress)) / 3).toFixed(1);

    // 3. UI Transition
    document.getElementById('vitalsForm').style.display = 'none';
    document.getElementById('aiStatus').style.display = 'block';
    const status = document.getElementById('statusText');

    // 4. Show the "Processing" steps
    setTimeout(() => { status.innerText = "Syncing Local Data..."; }, 800);
    setTimeout(() => { status.innerText = "Calculating Recovery Index..."; }, 1800);
    setTimeout(() => { 
        status.innerHTML = `Scan Complete! <br> <span style="font-size: 1.5rem; color: #0ea5e9;">Score: ${recoveryScore}/10</span>`; 
    }, 3000);
    
    // 5. Save to LocalStorage (so the Dashboard can see it without a database)
    localStorage.setItem('vitalsScore', recoveryScore);
    localStorage.setItem('lastSleep', sleep);

    // 6. Redirect to Dashboard
    setTimeout(() => {
        window.location.href = "index.html"; 
    }, 5000);
});
    </script>
</body>
</html>
